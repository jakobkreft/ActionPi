<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>ActionPi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0e1116">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <span class="logo">◉</span> ActionPi
        </div>
        <div class="topbar-right">
            <span id="conn" class="badge badge-idle">connecting…</span>
        </div>
    </header>

    <main>
        <!-- System status -->
        <section class="stats" id="stats">
            <div class="stat hidden" id="stat-battery">
                <span class="stat-label">Battery</span>
                <div class="battery-row">
                    <span class="battery"><span class="battery-fill" id="batt-fill"></span></span>
                    <span class="stat-value" id="batt-pct">–</span>
                    <span class="batt-bolt hidden" id="batt-bolt">⚡</span>
                </div>
                <span class="stat-sub" id="batt-volt"></span>
            </div>
            <div class="stat">
                <span class="stat-label">Temp</span>
                <span class="stat-value" id="stat-temp">–</span>
            </div>
            <div class="stat stat-grow">
                <span class="stat-label">Storage <span id="stat-disk-text">–</span></span>
                <div class="bar"><div class="bar-fill" id="stat-disk-bar"></div></div>
            </div>
        </section>

        <!-- Live capture banner -->
        <section id="live" class="live hidden">
            <div class="live-info">
                <div class="live-mode" id="live-mode">Recording</div>
                <div class="live-time" id="live-time">–</div>
                <div class="live-sub" id="live-sub"></div>
            </div>
            <button class="btn btn-stop" id="btn-stop">Stop</button>
        </section>

        <!-- Capture controls -->
        <section class="panel" id="capture-panel">
            <div class="segmented">
                <button class="seg active" data-mode="photo">Photo</button>
                <button class="seg" data-mode="video">Video</button>
                <button class="seg" data-mode="timelapse">Timelapse</button>
            </div>

            <div class="mode-body" id="mode-photo">
                <p class="hint">Capture a single still image.</p>
            </div>

            <div class="mode-body hidden" id="mode-video">
                <label>Duration
                    <span class="row">
                        <input type="number" id="video-duration" min="1" value="1">
                        <select id="video-unit">
                            <option value="60" selected>minutes</option>
                            <option value="1">seconds</option>
                            <option value="3600">hours</option>
                        </select>
                    </span>
                </label>
            </div>

            <div class="mode-body hidden" id="mode-timelapse">
                <label>Interval
                    <span class="row">
                        <input type="number" id="tl-interval" min="1" value="5">
                        <span class="unit">seconds</span>
                    </span>
                </label>
                <label>Duration
                    <span class="row">
                        <input type="number" id="tl-duration" min="1" value="60">
                        <select id="tl-unit">
                            <option value="60" selected>minutes</option>
                            <option value="3600">hours</option>
                        </select>
                    </span>
                </label>
                <p class="hint" id="tl-estimate"></p>
            </div>

            <button class="btn btn-primary btn-start" id="btn-start">Start</button>
        </section>

        <!-- Gallery -->
        <section class="gallery-head">
            <div class="tabs" id="tabs">
                <button class="tab active" data-filter="all">All</button>
                <button class="tab" data-filter="photo">Photos</button>
                <button class="tab" data-filter="video">Videos</button>
                <button class="tab" data-filter="timelapse">Timelapses</button>
            </div>
            <button class="btn btn-ghost btn-sm" id="btn-select">Select</button>
        </section>

        <div class="select-toolbar hidden" id="select-toolbar">
            <span id="select-count">0 selected</span>
            <div class="spacer"></div>
            <button class="btn btn-sm" id="btn-dl-selected">Download</button>
            <button class="btn btn-sm btn-danger" id="btn-del-selected">Delete</button>
            <button class="btn btn-sm btn-ghost" id="btn-cancel-select">Cancel</button>
        </div>

        <section class="grid" id="gallery"></section>
        <p class="empty hidden" id="gallery-empty">No media yet.</p>
    </main>

    <footer class="footer">
        <button class="btn btn-ghost btn-sm" id="btn-debug">Debug</button>
        <button class="btn btn-ghost btn-sm" id="btn-reboot">Reboot</button>
        <button class="btn btn-ghost btn-sm btn-danger" id="btn-shutdown">Shutdown</button>
    </footer>

    <!-- Lightbox / viewer -->
    <div class="modal hidden" id="viewer">
        <div class="modal-bar">
            <span id="viewer-title"></span>
            <div class="spacer"></div>
            <a class="btn btn-sm" id="viewer-download">Download</a>
            <button class="btn btn-sm btn-danger" id="viewer-delete">Delete</button>
            <button class="btn btn-sm btn-ghost" id="viewer-close">✕</button>
        </div>
        <button class="nav nav-prev" id="viewer-prev">‹</button>
        <div class="modal-content" id="viewer-content"></div>
        <button class="nav nav-next" id="viewer-next">›</button>
    </div>

    <!-- Timelapse frames -->
    <div class="modal hidden" id="tlview">
        <div class="modal-bar">
            <span id="tlview-title"></span>
            <div class="spacer"></div>
            <a class="btn btn-sm" id="tlview-download">Download all</a>
            <button class="btn btn-sm btn-ghost" id="tlview-close">✕</button>
        </div>
        <div class="modal-content modal-scroll">
            <div class="grid grid-dense" id="tlview-grid"></div>
        </div>
    </div>

    <!-- Debug: diagnostics + live logs -->
    <div class="modal hidden" id="debug">
        <div class="modal-bar">
            <span>Debug &amp; logs</span>
            <div class="spacer"></div>
            <select id="log-level" class="mini-select">
                <option value="DEBUG">Debug+</option>
                <option value="INFO" selected>Info+</option>
                <option value="WARNING">Warnings+</option>
                <option value="ERROR">Errors</option>
            </select>
            <a class="btn btn-sm" id="log-download" href="/api/logs/download">Download</a>
            <button class="btn btn-sm btn-ghost" id="debug-close">✕</button>
        </div>
        <div class="modal-content modal-scroll">
            <div id="diag-cards" class="diag-cards"></div>
            <h3 class="logs-title">Logs</h3>
            <div id="log-console" class="log-console"></div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
